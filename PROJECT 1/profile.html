<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile — Mama Oliech Restaurant</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        body { background: var(--surface, #FBF6EE); min-height: 100vh; }

        .profile-wrapper {
            max-width: 860px;
            margin: 2rem auto;
            padding: 0 1.25rem 4rem;
        }

        .profile-hero {
            background: linear-gradient(135deg, var(--brand-terracotta, #D9692D), #b8521f);
            border-radius: 20px;
            padding: 2rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 24px rgba(217,105,45,0.3);
        }

        .profile-avatar {
            width: 72px;
            height: 72px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }

        .profile-hero-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .profile-hero-email { opacity: 0.85; font-size: 0.9rem; margin-top: 0.2rem; }
        .profile-hero-phone { opacity: 0.75; font-size: 0.85rem; margin-top: 0.1rem; }

        .profile-panel {
            background: #fff;
            border-radius: 16px;
            padding: 1.75rem;
            box-shadow: 0 2px 16px rgba(0,0,0,0.07);
            margin-bottom: 1.5rem;
        }

        .profile-panel h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            margin-bottom: 1.25rem;
            color: var(--on-surface, #1C1B1F);
            border-bottom: 2px solid var(--brand-terracotta, #D9692D);
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .order-card {
            border: 1.5px solid rgba(0,0,0,0.08);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            transition: border-color 0.2s;
        }
        .order-card:hover { border-color: var(--brand-terracotta, #D9692D); }

        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .order-id { font-weight: 700; color: var(--brand-terracotta, #D9692D); font-size: 0.85rem; }
        .order-date { font-size: 0.8rem; color: #888; }
        .order-total { font-weight: 700; font-size: 1rem; color: #2e7d32; }
        .order-items { font-size: 0.85rem; color: #555; line-height: 1.6; }
        .order-mpesa { font-size: 0.78rem; color: #888; margin-top: 0.35rem; }

        .reservation-card {
            border: 1.5px solid rgba(0,0,0,0.08);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .res-date-block { font-weight: 700; font-size: 0.95rem; }
        .res-detail { font-size: 0.82rem; color: #666; margin-top: 0.2rem; }

        .res-status {
            padding: 0.3rem 0.75rem;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: capitalize;
        }
        .res-status.pending   { background: #fff3e0; color: #e65100; }
        .res-status.confirmed { background: #e8f5e9; color: #2e7d32; }
        .res-status.completed { background: #e3f2fd; color: #1565c0; }

        .empty-state { text-align: center; padding: 2rem; opacity: 0.55; font-size: 0.95rem; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            color: var(--brand-terracotta, #D9692D);
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            margin-bottom: 1.5rem;
        }
        .back-link:hover { text-decoration: underline; }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1.5px solid rgba(255,255,255,0.5);
            color: #fff;
            border-radius: 8px;
            padding: 0.45rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.75rem;
            transition: background 0.2s;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.35); }
    </style>
</head>
<body>

<header style="background:#fff;padding:1rem 2rem;box-shadow:0 1px 8px rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:space-between;">
    <a href="index.html" style="font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--brand-terracotta,#D9692D);text-decoration:none;">
        🐟 Mama Oliech
    </a>
    <nav style="display:flex;align-items:center;gap:1rem;">
        <a href="menu.html" style="font-size:0.9rem;font-weight:600;color:#333;text-decoration:none;">Menu</a>
        <a href="index.html" style="font-size:0.9rem;font-weight:600;color:#333;text-decoration:none;">Home</a>
    </nav>
</header>

<main>
    <div class="profile-wrapper">
        <a href="index.html" class="back-link">← Back to Home</a>

        <div class="profile-hero" id="profile-hero">
            <div class="profile-avatar">👤</div>
            <div style="flex:1;">
                <div class="profile-hero-name" id="profile-name">Loading…</div>
                <div class="profile-hero-email" id="profile-email"></div>
                <div class="profile-hero-phone" id="profile-phone"></div>
                <button class="logout-btn" id="profile-logout-btn">Logout</button>
            </div>
        </div>

        <div class="profile-panel">
            <h2>🧾 Order History</h2>
            <div id="orders-container">
                <div class="empty-state">No orders yet. <a href="menu.html" style="color:var(--brand-terracotta,#D9692D);font-weight:600;">Browse the menu</a> to place your first order!</div>
            </div>
        </div>

        <div class="profile-panel">
            <h2>📅 My Reservations</h2>
            <div id="reservations-container">
                <div class="empty-state">No reservations yet. <a href="index.html#reserve" style="color:var(--brand-terracotta,#D9692D);font-weight:600;">Make a reservation</a>.</div>
            </div>
        </div>
    </div>
</main>

<script src="js/auth.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    if (!window.Auth || !window.Auth.isLoggedIn()) return;

    const userData = window.Auth.getFullUserData();
    if (!userData) return;

    document.getElementById('profile-name').textContent  = userData.name;
    document.getElementById('profile-email').textContent = userData.email;
    document.getElementById('profile-phone').textContent = userData.phone;

    document.getElementById('profile-logout-btn').addEventListener('click', () => {
        window.Auth.logoutUser();
        window.location.href = 'index.html';
    });

    const ordersEl = document.getElementById('orders-container');
    const orders   = userData.orders || [];

    if (orders.length > 0) {
        ordersEl.innerHTML = '';
        orders.forEach(order => {
            const date = new Date(order.date).toLocaleDateString('en-KE', {
                weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
            });
            const itemList = Array.isArray(order.items)
                ? order.items.map(i => `${i.name} ×${i.qty}`).join(', ')
                : (order.description || '—');

            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div class="order-card-header">
                    <span class="order-id">${order.orderId || '—'}</span>
                    <span class="order-date">${date}</span>
                    <span class="order-total">KES ${Number(order.total || 0).toLocaleString('en-KE')}</span>
                </div>
                <div class="order-items">${itemList}</div>
                ${order.mpesaCode ? `<div class="order-mpesa">M-Pesa: ${order.mpesaCode}</div>` : ''}
            `;
            ordersEl.appendChild(card);
        });
    }

    const resEl        = document.getElementById('reservations-container');
    const reservations = userData.reservations || [];

    if (reservations.length > 0) {
        resEl.innerHTML = '';
        reservations.forEach(res => {
            const dateLabel = new Date(res.date + 'T00:00').toLocaleDateString('en-KE', {
                weekday: 'short', month: 'long', day: 'numeric', year: 'numeric',
            });

            const card = document.createElement('div');
            card.className = 'reservation-card';
            card.innerHTML = `
                <div>
                    <div class="res-date-block">${dateLabel} at ${res.time}</div>
                    <div class="res-detail">${res.size} ${Number(res.size) === 1 ? 'guest' : 'guests'} · ${res.requests !== 'None' ? res.requests : 'No special requests'}</div>
                    <div class="res-detail" style="margin-top:0.15rem;font-weight:600;color:#555;">${res.id}</div>
                </div>
                <span class="res-status ${res.status}">${res.status}</span>
            `;
            resEl.appendChild(card);
        });
    }
});
</script>
</body>
</html>
